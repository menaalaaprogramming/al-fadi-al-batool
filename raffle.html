<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحب الجوائز | الفادي والبتول</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/raffle.css">
</head>

<body>

    <header class="raffle-header">

        <h1>🎁 سحب الجوائز</h1>

        <p>
            إدارة المسابقات واختيار الفائزين بطريقة احترافية
        </p>

    </header>

    <main class="raffle-container">

        <!-- الجائزة -->

        <section class="prize-section">

            <h2>الجائزة الحالية</h2>

            <input
                type="text"
                id="prizeInput"
                placeholder="مثال: خاتم ذهب عيار 21">

        </section>

        <!-- المشاركون -->

        <section class="participants-section">

            <h2>المشاركون</h2>

            <textarea
                id="participantsInput"
                placeholder="اكتب كل اسم في سطر منفصل&#10;محمد&#10;أحمد&#10;سارة"></textarea>

            <button id="loadNamesBtn">
                تحميل الأسماء
            </button>

        </section>

        <!-- العجلة -->

        <section class="wheel-section">

            <h2>عجلة الحظ</h2>

            <div class="wheel-wrapper">

                <div class="pointer"></div>

                <div id="wheel">

                    <span>
                        أضف المشاركين أولاً
                    </span>

                </div>

            </div>

        </section>

        <!-- زر السحب -->

        <section class="draw-section">

            <button id="spinBtn">
                🎯 ابدأ السحب
            </button>

        </section>

        <!-- النتيجة -->

        <section class="winner-section">

            <h2>الفائز</h2>

            <div id="winnerName">

                لم يتم اختيار فائز بعد

            </div>

        </section>

    </main>

    <script src="js/raffle.js"></script>

</body>

</html>
